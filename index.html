<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>2026-1 운동생리학 중간고사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a4fa0;--blue2:#2563eb;--light:#e8f0fe;--green:#166534;--red:#b91c1c;--orange:#c2410c;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:#1e293b;font-size:14px;line-height:1.6}
.screen{min-height:100vh;display:none}
.screen.on{display:block}

/* ══ 로그인 ══════════════════════════════════════════════════ */
#s-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#0369a1 100%)}
.login-wrap{background:#fff;border-radius:20px;padding:40px 32px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;font-size:48px;margin-bottom:12px}
.login-title{text-align:center;font-size:18px;font-weight:800;color:var(--blue);margin-bottom:4px}
.login-sub{text-align:center;font-size:12px;color:#64748b;margin-bottom:28px}
.phase-badge{display:inline-block;padding:3px 12px;border-radius:99px;font-size:11px;font-weight:700;margin-left:6px}
.pb-before{background:#f1f5f9;color:#64748b}
.pb-exam{background:#dcfce7;color:#166534}
.pb-recov{background:#fef3c7;color:#92400e}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue2)}
.btn-login{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-login:hover{background:#1e40af}
.login-err{min-height:20px;text-align:center;font-size:12px;color:var(--red);margin-top:10px}

/* ══ 이탈 잠금 ═══════════════════════════════════════════════ */
#lock-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
#lock-overlay.on{display:flex}
.lock-icon{font-size:72px;margin-bottom:20px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.lock-ttl{color:#fff;font-size:22px;font-weight:800;margin-bottom:8px}
.lock-msg{color:#94a3b8;font-size:13px;text-align:center;line-height:1.8;margin-bottom:28px}
#lock-secs{font-size:64px;font-weight:900;color:#f87171;font-variant-numeric:tabular-nums}
.lock-hint{color:#64748b;font-size:12px;margin-top:10px}

/* ══ 시험 화면 ═══════════════════════════════════════════════ */
#s-exam{display:none}
#s-exam.on{display:block}
.recov-bar{background:#ea580c;color:#fff;text-align:center;padding:8px 16px;font-size:13px;font-weight:700;display:none}

/* 헤더 */
.exam-hdr{position:sticky;top:0;z-index:100;background:var(--blue);color:#fff;display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:10px 20px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-title{font-size:13px;font-weight:800}
.hdr-info{font-size:11px;opacity:.75;margin-top:1px}
.timer-box{background:rgba(255,255,255,.15);border-radius:10px;padding:6px 16px;text-align:center;min-width:90px}
.timer-lbl{font-size:10px;opacity:.8;margin-bottom:1px}
#timer{font-size:24px;font-weight:900;letter-spacing:1px;font-variant-numeric:tabular-nums}
.timer-warn{color:#fbbf24!important}
.timer-danger{color:#f87171!important;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.btn-submit-hdr{background:#fff;color:var(--blue);border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap}
.btn-submit-hdr:hover{background:#dbeafe}

/* 본문 */
.exam-body{max-width:860px;margin:0 auto;padding:16px 20px 80px}

.sec-title{font-size:13px;font-weight:800;color:var(--blue);background:var(--light);border-left:4px solid var(--blue);padding:10px 16px;border-radius:0 8px 8px 0;margin:24px 0 14px}

/* 문제 카드 */
.q-card{background:var(--card);border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1.5px solid transparent;transition:border .15s}
.q-card.answered{border-color:#bbf7d0}
.q-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.q-num-badge{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:1px}
.q-num-sp{background:#7c3aed}
.q-body{flex:1}
.q-text{font-size:13px;line-height:1.8;margin-bottom:2px}
.q-pts{font-size:11px;color:#94a3b8;font-weight:600}
.warn-tag{display:inline-block;background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;vertical-align:middle}

/* 표 */
.q-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0 14px;border-radius:8px;overflow:hidden}
.q-table th,.q-table td{border:1px solid #e2e8f0;padding:7px 10px;text-align:center}
.q-table th{background:#f8fafc;font-weight:700;color:#475569}
.q-table td:first-child{text-align:left;font-weight:600;color:#475569}

/* 라디오 선택지 */
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;transition:all .12s;user-select:none}
.opt:hover{border-color:var(--blue2);background:#eff6ff}
.opt.sel{border-color:var(--blue2);background:#eff6ff}
.opt input[type=radio]{margin-top:2px;accent-color:var(--blue);flex-shrink:0}
.opt label{font-size:13px;line-height:1.7;cursor:pointer;flex:1}
.opt-mark{font-weight:700;color:var(--blue);min-width:18px;flex-shrink:0;margin-top:2px}

/* 체크박스 (Type IIx) */
.cb-note{background:#fef3c7;border:1px solid #fcd34d;border-radius:7px;padding:7px 12px;font-size:12px;color:#78350f;margin-bottom:10px}
.cb-opts{display:flex;flex-direction:column;gap:6px}
.cb-opt{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;transition:all .12s;user-select:none}
.cb-opt:hover{border-color:#7c3aed;background:#f5f3ff}
.cb-opt.sel{border-color:#7c3aed;background:#f5f3ff}
.cb-opt input[type=checkbox]{accent-color:#7c3aed;flex-shrink:0}
.cb-opt label{font-size:13px;cursor:pointer;flex:1}
.cb-mark{font-weight:700;color:#7c3aed;min-width:22px;flex-shrink:0}

/* 서술형 */
.essay-area{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:12px;font-size:13px;font-family:inherit;resize:vertical;outline:none;min-height:130px;line-height:1.8;margin-top:12px;transition:border .15s}
.essay-area:focus{border-color:var(--blue2)}
.char-ct{text-align:right;font-size:11px;color:#94a3b8;margin-top:4px}

.submit-section{text-align:center;padding:20px 0 10px}
.btn-final{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px 48px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(26,79,160,.35)}
.btn-final:hover{background:#1e40af;transform:translateY(-1px)}
.submit-hint{font-size:11px;color:#94a3b8;margin-top:8px}

/* ══ 완료 화면 ═══════════════════════════════════════════════ */
#s-done{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#064e3b 0%,#065f46 100%)}
#s-done.on{display:flex}
.done-wrap{background:#fff;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.done-icon{font-size:64px;margin-bottom:20px}
.done-ttl{font-size:20px;font-weight:800;margin-bottom:12px}
.done-msg{font-size:13px;color:#475569;line-height:1.9}
.done-warn{font-size:12px;color:var(--red);margin-top:10px;background:#fef2f2;border-radius:8px;padding:8px 12px}

@media(max-width:600px){
  .exam-hdr{grid-template-columns:1fr auto;grid-template-rows:auto auto}
  .btn-submit-hdr{grid-column:1/-1;width:100%;padding:8px}
  .exam-body{padding:12px 12px 80px}
  .q-card{padding:14px 14px}
}
</style>
</head>
<body>

<!-- ── 로그인 ─────────────────────────────────────────────────── -->
<div id="s-login" class="screen on">
  <div class="login-wrap">
    <div class="login-logo">📖</div>
    <div class="login-title">운동생리학 중간고사</div>
    <div class="login-sub" id="phase-txt">2026년 1학기 &nbsp;<span class="phase-badge pb-before" id="phase-badge">확인 중...</span></div>
    <div class="field"><label>학 번</label><input type="text" id="inp-id" placeholder="학번을 입력하세요" maxlength="20" autocomplete="off"></div>
    <div class="field"><label>이 름</label><input type="text" id="inp-name" placeholder="이름을 입력하세요" maxlength="10" autocomplete="off"></div>
    <div class="field"><label>접속 코드</label><input type="text" id="inp-code" placeholder="교수님께 받은 코드 입력" maxlength="10" autocomplete="off" onkeydown="if(event.key==='Enter')tryLogin()"></div>
    <button class="btn-login" onclick="tryLogin()">시험 입장 →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── 이탈 잠금 오버레이 ───────────────────────────────────────── -->
<div id="lock-overlay">
  <div class="lock-icon">🔒</div>
  <div class="lock-ttl">화면 이탈 감지</div>
  <div class="lock-msg">다른 창 또는 탭을 열면 안 됩니다.<br>아래 시간이 끝나면 자동으로 돌아옵니다.<br><small style="color:#f87171">이탈 횟수는 교수님께 전달됩니다.</small></div>
  <div id="lock-secs">60</div>
  <div class="lock-hint">잠금 해제까지 남은 시간(초)</div>
</div>

<!-- ── 시험 ───────────────────────────────────────────────────── -->
<div id="s-exam" class="screen">
  <div class="recov-bar" id="recov-bar">⚠️ 복구 제출 모드 — 저장된 답안을 확인하고 제출하세요 (코드 8651)</div>
  <div class="exam-hdr">
    <div>
      <div class="hdr-title">운동생리학 중간고사</div>
      <div class="hdr-info" id="hdr-info">—</div>
    </div>
    <div class="timer-box">
      <div class="timer-lbl">남은 시간</div>
      <div id="timer">40:00</div>
    </div>
    <button class="btn-submit-hdr" id="hdr-submit-btn" onclick="confirmSubmit()">📤 제출</button>
  </div>
  <div class="exam-body" id="exam-body"></div>
</div>

<!-- ── 완료 ───────────────────────────────────────────────────── -->
<div id="s-done" class="screen">
  <div class="done-wrap">
    <div class="done-icon" id="done-icon">✅</div>
    <div class="done-ttl" id="done-ttl">제출 완료</div>
    <div class="done-msg" id="done-msg">—</div>
    <div class="done-warn" id="done-warn" style="display:none"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// ⚙️  교수님 설정 영역 — 배포 전 반드시 수정하세요
// ════════════════════════════════════════════════════════════════
const EXAM_CONFIG = {
  mainCode:    '2580',                       // ← 시험 중 접속 코드 (변경 필요)
  recoveryCode:'8651',                       // ← 복구 코드 (40분 후 자동전환, 수정 불필요)
  startISO:    '2026-04-22T09:00:00',        // ← 시험 시작 시각 (변경 필요)
  durationMin: 40,                           // ← 시험 시간(분)
  scriptURL: 'https://script.google.com/macros/s/AKfycbwVEybukvMoCuVvRG07Cz89LpHf7nnFwv5YbhIgtmzE-Fu4I248d4ydBh1Snn1EERFR/exec'
};
// ════════════════════════════════════════════════════════════════

// ── 정답 / 배점 데이터 ────────────────────────────────────────
// MC Q1~Q14 (5점 × 14 = 70점) + 서술형 Q15~Q20 (5점 × 6 = 30점) = 100점
const MC_ANS = {1:4,2:3,3:2,4:3,5:1,6:2,7:4,8:1,9:3,10:4,11:3,12:3,13:4,14:3};
const MC_PTS = {1:5,2:5,3:5,4:5,5:5,6:5,7:5,8:5,9:5,10:5,11:5,12:5,13:5,14:5};
const ESSAY_PTS = {15:5,16:5,17:5,18:5,19:5,20:5}; // Q15~Q20

// ── 문제 데이터 ───────────────────────────────────────────────
const MC_DATA = [
  {n:1, pts:5, text:'항상성 조절을 위한 부적 피드백(negative feedback)의 예가 <b>아닌 것</b>은?',
   opts:['식사 후 혈당 증가에 대한 인슐린의 분비','고온 환경에 노출 시 체온 증가에 대한 땀의 분비','저온 환경에 노출 시 체온 감소에 대한 근육의 떨림','출산 시 자궁경부(cervix) 내 압력 증가에 대한 옥시토신(oxytocin)의 분비']},

  {n:2, pts:5, text:'다음 표는 인체의 세 가지 주요 에너지 시스템에 관한 정보입니다. (가)~(다)에 들어갈 알맞은 에너지 시스템을 고르시오.',
   extra:`<table class="q-table"><tr><th></th><th>(가) 시스템</th><th>(나) 시스템</th><th>(다) 시스템</th></tr>
<tr><td>산소 필요 여부</td><td>필요 없음</td><td>필요 없음</td><td>필요함</td></tr>
<tr><td>지속 시간</td><td>50초~2분</td><td>10초 이내</td><td>장시간</td></tr>
<tr><td>주에너지원</td><td>탄수화물</td><td>탄수화물</td><td>탄수화물, 지방</td></tr>
<tr><td>주 활용 운동</td><td>400m 달리기</td><td>역도</td><td>마라톤</td></tr></table>`,
   opts:['(가) ATP-PC — (나) 젖산 — (다) 유산소성','(가) ATP-PC — (나) 유산소성 — (다) 젖산','(가) 젖산 — (나) ATP-PC — (다) 유산소성','(가) 젖산 — (나) 유산소성 — (다) ATP-PC']},

  {n:3, pts:5, text:'호흡교환율(RER)과 관련된 설명으로 <b>옳지 않은 것</b>은?',
   opts:['산소 섭취량과 이산화탄소 생성량의 비율이다.','지방을 100% 사용했을 때의 호흡교환율(RER)은 1.00이다.','운동 시 탄수화물과 지방의 연료 이용(fuel utilization)을 확인할 수 있다.','호흡지수(RQ) 혹은 비단백질 호흡율(nonprotein R)이라고도 한다.']},

  {n:4, pts:5, text:'인체에서 사용되는 주요 에너지원에 대한 설명으로 <b>옳은 것</b>은?',
   opts:['포도당(glucose)은 대사작용에 중요한 지방의 한 형태이며, 뇌의 유일한 에너지원이다.','탄수화물은 단당류, 이당류, 다당류를 포함한 무기물질이며, 단당류가 체내에 가장 잘 흡수된다.','중성지방은 글리세롤(glycerol) 1분자와 지방산 3분자로 구성되며, 지방산은 포화지방산과 불포화지방산으로 구분된다.','단백질은 주로 근육, 장기(organ), 호르몬 등을 만드는 재료로 사용되며, 운동 시 주 에너지원으로 사용된다.']},

  {n:5, pts:5, text:'운동과 에너지 대사에 관한 설명 중 <b>가장 옳지 않은 것</b>은?',
   opts:['해당과정(glycolysis) 부산물인 피루브산(pyruvic acid)은 산소와 결합하여 젖산으로 전환된다.','한 분자의 글루코스를 이용할 때 유산소 시스템은 무산소 해당과정에 비해 더 많은 양의 에너지를 생성한다.','지방 대사 시 중성지방은 유리지방산과 글리세롤로 분해되며 유리지방산이 주에너지원으로 이용된다.','탄수화물 대사 과정에는 해당과정, 크렙스회로(Krebs cycle), 전자전달계(electron transport chain)가 포함된다.']},

  {n:6, pts:5, text:'아래 &lt;보기&gt;에서 신경세포 구조 및 전기적 활동에 관한 설명으로 <b>가장 적절한 것</b>은?<br><br>' +
   '㉠ 안정 시: 세포막 안쪽은 Na⁺ 농도가 높고, 바깥쪽은 K⁺ 농도가 높다.<br>' +
   '㉡ 탈분극: 뉴런이 역치 이상의 자극을 받으면 Na⁺ 통로가 열려 Na⁺이 세포 안으로 확산<br>' +
   '㉢ 재분극: 막전위가 최고점에 이르면 K⁺ 통로가 닫혀 K⁺ 유입이 줄고, Na⁺ 통로가 열려 Na⁺이 세포 밖으로 확산됨<br>' +
   '㉣ 분극: Na⁺-K⁺ 펌프에 의해 이온이 재배치되어 다시 분극 상태로 돌아감',
   opts:['㉠, ㉣','㉡, ㉣','㉢, ㉣','㉡, ㉢, ㉣']},

  {n:7, pts:5, text:'운동 시 연료선택의 결정에 대한 설명으로 <b>옳지 않은 것</b>은?',
   opts:['지방은 주로 최대산소섭취량의 30% 이하인 낮은 강도에서 주 원료로 사용','탄수화물은 최대산소섭취량의 70% 이상인 고강도 운동의 주 원료로 사용','대체적으로 운동시간이 증가할수록 탄수화물보다는 지방을 주 연료로 사용','지방은 주로 낮은 운동강도에서 잘 연소되므로, 체지방 감량을 위해서는 되도록 가벼운 강도의 활동이 지방연소에 가장 효율적이다.']},

  {n:8, pts:5, text:'&lt;보기&gt;의 괄호 안에 들어갈 용어로 <b>가장 적절한 것</b>은?<br><br>' +
   '· 활동전위가 근세포막을 따라 가로세관(T-tubules)을 통과하면 저장된 <b>(㉠)</b>이 근형질세망(sarcoplasmic reticulum)에서 분비된다.<br>' +
   '· <b>(㉠)</b>이 <b>(㉡)</b>과 결합하면 <b>(㉢)</b>의 위치 변화에 의해 액틴의 활성부위(active site)가 노출되어 마이오신 머리와 액틴이 결합된다.',
   extra:`<table class="q-table"><tr><th></th><th>㉠</th><th>㉡</th><th>㉢</th></tr>
<tr><td>①</td><td>Ca²⁺(칼슘)</td><td>트로포닌(troponin)</td><td>트로포마이오신(tropomyosin)</td></tr>
<tr><td>②</td><td>K⁺(칼륨)</td><td>트로포닌</td><td>트로포마이오신</td></tr>
<tr><td>③</td><td>Ca²⁺</td><td>트로포마이오신</td><td>트로포닌</td></tr>
<tr><td>④</td><td>K⁺</td><td>트로포마이오신</td><td>트로포닌</td></tr></table>`,
   opts:['Ca²⁺(칼슘) / 트로포닌(troponin) / 트로포마이오신(tropomyosin)','K⁺(칼륨) / 트로포닌 / 트로포마이오신','Ca²⁺ / 트로포마이오신 / 트로포닌','K⁺ / 트로포마이오신 / 트로포닌']},

  {n:9, pts:5, text:'지방의 에너지 동원(지방의 산화과정)에 관한 설명 중 <b>가장 옳지 않은 것</b>을 고르시오.',
   opts:['지방의 산화과정에서 에피네프린과 노르에피네프린은 활성화된다.','글루카곤과 코티졸은 증가한다.','젖산의 생성은 증가한다.','인슐린의 작용은 억제된다.']},

  {n:10, pts:5, text:'&lt;보기&gt;에서 설명하는 기관으로 <b>가장 적절한 것</b>은?<br><br>' +
   '· 중추신경계의 일부분으로 대뇌의 기능을 보조<br>' +
   '· 조화로운 운동을 가능하게 하고 몸의 균형을 잡는데 중추적인 역할을 수행<br>' +
   '· 무의식적인 자세조절, 정교한 동작 등과 관련',
   opts:['간뇌(Diencephalon)','대뇌(Cerebrum)','둘레계(변연계, Limbic system)','소뇌(Cerebellum)']},

   opts:['저항성 운동 시 Type IIb(속근)가 먼저 동원된 후 Type I(지근)이 추가로 동원된다.','저중량·고반복 운동은 Type I만 동원되므로 속근(Type IIb) 발달에는 효과가 없다.','운동 종료 시 동원 해제(decruitment)는 Type IIb부터 먼저 비활성화되고, Type I은 마지막까지 활성 상태를 유지한다.','노화에 따라 Type I 섬유가 Type II 섬유보다 약 2~3배 빠르게 감소한다.']}

  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');if(s.style.display==='flex')s.style.display='none'});
  const el=$(id);
  if(id==='s-done'){el.style.display='flex';el.classList.add('on');}
  else el.classList.add('on');
}

// ── 시간 기반 페이즈 ─────────────────────────────────────────────
//   before  : 시험 시작 10분 전까지
//   exam    : startISO ~ startISO+40분  → mainCode 유효
//   recovery: startISO+40분 이후       → recoveryCode(8651) 유효
function getPhase(){
  const start=new Date(EXAM_CONFIG.startISO);
  const diff=(Date.now()-start)/60000; // 분
  if(diff < -10) return 'before';
  if(diff <= EXAM_CONFIG.durationMin) return 'exam';
  return 'recovery';
}
function isValidCode(code){
  // 8651(복구/관리자 코드)은 시간에 관계없이 항상 유효
  if(code===EXAM_CONFIG.recoveryCode) return true;
  // 일반 접속코드(2580)는 시험 시간 중에만 유효
  const p=getPhase();
  if(p==='before') return false;
  if(p==='exam')   return code===EXAM_CONFIG.mainCode;
  return false;
}

// ── 로그인 화면 초기화 ────────────────────────────────────────────
(function initLoginUI(){
  const p=getPhase();
  const badge=$('phase-badge');
  if(p==='before'){badge.className='phase-badge pb-before';badge.textContent='시험 시작 전 (관리자: 8651)';}
  else if(p==='exam'){badge.className='phase-badge pb-exam';badge.textContent='● 진행 중';}
  else{badge.className='phase-badge pb-recov';badge.textContent='복구 제출 모드';}
})();

// ── 로그인 ────────────────────────────────────────────────────────
function tryLogin(){
  const id=$('inp-id').value.trim();
  const nm=$('inp-name').value.trim();
  const cd=$('inp-code').value.trim();
  if(!id||!nm){$('login-err').textContent='학번과 이름을 모두 입력해주세요.';return;}
  const p=getPhase();
  if(p==='before'){$('login-err').textContent='시험이 아직 시작되지 않았습니다. 잠시 후 다시 시도하세요.';return;}
  if(!isValidCode(cd)){
      $('login-err').textContent='접속 코드가 올바르지 않습니다. 다시 확인하세요.';
    return;
  }
  sid=id; sname=nm; isRecov=(p==='recovery');
  if(isRecov){$('recov-bar').style.display='block';loadStorage();}
  $('hdr-info').textContent=`${sname}  |  학번: ${sid}`;
  showScreen('s-exam');
  buildExam();
  startTimer();
  setTimeout(()=>{initGuard();},600); // 로그인 직후 blur 방지
}

// ── 시험 본문 생성 ─────────────────────────────────────────────────
function buildExam(){
  let h='';
  // 객관식
  h+=`<div class="sec-title">✏️ 객관식 — 1번 ~ 13번</div>`;
  MC_DATA.forEach(q=>{
    const MARKS=['①','②','③','④'];
    h+=`<div class="q-card" id="qc${q.n}">
<div class="q-head">
  <div class="q-num-badge">${q.n}</div>
  <div class="q-body">
    <div class="q-text">${q.text}</div>
    <div class="q-pts">(${q.pts}점)</div>
  </div>
</div>`;
    if(q.extra) h+=q.extra;
    h+=`<div class="opts" id="opts${q.n}">`;
    q.opts.forEach((o,i)=>{
      const v=i+1, sel=ans.mc[q.n]===v?'sel':'';
      h+=`<div class="opt ${sel}" onclick="pickMC(${q.n},${v},this)">
  <input type="radio" name="mc${q.n}" value="${v}" ${ans.mc[q.n]===v?'checked':''} id="r${q.n}_${v}" onclick="event.stopPropagation()">
  <span class="opt-mark">${MARKS[i]}</span>
  <label for="r${q.n}_${v}">${o}</label>
</div>`;
    });
    h+=`</div></div>`;
  });

  // 서술형
  h+=`<div class="sec-title">📝 서술형 주관식 — 15번 ~ 20번</div>`;
  ESSAY_DATA.forEach(q=>{
    const saved=ans.essay[q.n]||'';
    h+=`<div class="q-card" id="qce${q.n}">
<div class="q-head">
  <div class="q-num-badge">${q.n}</div>
  <div class="q-body">
    <div class="q-text">${q.txt}</div>
    <div class="q-pts">(${q.pts}점)</div>
  </div>
</div>
<textarea class="essay-area" id="ea${q.n}" placeholder="${q.lbl}에 대한 답을 작성하세요...">${saved}</textarea>
<div class="char-ct" id="cc${q.n}">${saved.length}자</div>
</div>`;
  });

  // 제출
  h+=`<div class="submit-section">
<button class="btn-final" id="final-btn" onclick="confirmSubmit()">📤 최종 제출하기</button>
<div class="submit-hint">제출 후에는 수정이 불가능합니다.</div>
</div>`;

  $('exam-body').innerHTML=h;

  // 서술형 이벤트
  ESSAY_DATA.forEach(q=>{
    const ta=$('ea'+q.n);
    if(ta) ta.addEventListener('input',()=>{
      $('cc'+q.n).textContent=ta.value.length+'자';
      autoSave();
    });
  });
  updateAnsweredStyles();
}

// ── 답안 선택 ─────────────────────────────────────────────────────
function pickMC(n,v,el){
  ans.mc[n]=v;
  document.querySelectorAll(`#opts${n} .opt`).forEach(e=>e.classList.remove('sel'));
  el.closest('.opt').classList.add('sel');
  el.closest('.opt').querySelector('input[type=radio]').checked=true;
  updateCard(n,true);
  autoSave();
}
function pickIIX(i,el){
  const wrap=el.classList.contains('cb-opt')?el:el.closest('.cb-opt');
  const pos=ans.iix.indexOf(i);
  const cb=$('iix'+i);
  if(pos===-1){ans.iix.push(i);wrap.classList.add('sel');if(cb)cb.checked=true;}
  else{ans.iix.splice(pos,1);wrap.classList.remove('sel');if(cb)cb.checked=false;}
  $('qciix').classList.toggle('answered',ans.iix.length>0);
  autoSave();
}
function pickSP(v,el){
  ans.sp=v;
  document.querySelectorAll('#opts-sp .opt').forEach(e=>e.classList.remove('sel'));
  el.closest('.opt').classList.add('sel');
  el.closest('.opt').querySelector('input[type=radio]').checked=true;
  $('qcsp').classList.add('answered');
  autoSave();
}
function updateCard(n,answered){
  const card=$('qc'+n);
  if(card) card.classList.toggle('answered',answered);
}
function updateAnsweredStyles(){
  Object.keys(ans.mc).forEach(n=>{if(ans.mc[n]) updateCard(parseInt(n),true);});
  if(ans.iix.length>0) $('qciix')&&$('qciix').classList.add('answered');
  if(ans.sp)            $('qcsp')&&$('qcsp').classList.add('answered');
  ESSAY_DATA.forEach(q=>{
    const card=$('qce'+q.n);
    if(card&&ans.essay[q.n]) card.classList.add('answered');
  });
}

// ── 자동 저장 / 복구 로드 ─────────────────────────────────────────
function collectData(){
  const essay={};
  ESSAY_DATA.forEach(q=>{const t=$('ea'+q.n);essay[q.n]=t?t.value:(ans.essay[q.n]||'');});
  return {sid,sname,warnCnt,ans:{mc:ans.mc,iix:ans.iix,sp:ans.sp,essay},
          savedAt:new Date().toLocaleString('ko-KR'),_recovery:isRecov};
}
function autoSave(){
  const d=collectData();
  localStorage.setItem('physio26_'+sid,JSON.stringify(d));
}
function loadStorage(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('physio26_'));
  if(!keys.length) return;
  try{
    const d=JSON.parse(localStorage.getItem(keys[0]));
    if(d&&d.ans){ans.mc=d.ans.mc||{};ans.iix=d.ans.iix||[];ans.sp=d.ans.sp||null;ans.essay=d.ans.essay||{};}
  }catch(e){}
}

// ── 타이머 ────────────────────────────────────────────────────────
function startTimer(){
  timerSec=EXAM_CONFIG.durationMin*60;
  timerIv=setInterval(tickTimer,1000);
  tickTimer();
}
function tickTimer(){
  timerSec--;
  if(timerSec<=0){clearInterval(timerIv);autoSubmit();return;}
  const m=Math.floor(timerSec/60), s=timerSec%60;
  const el=$('timer');
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className=timerSec<=120?'timer-danger':timerSec<=300?'timer-warn':'';
  if(timerSec===300) showAlert('⚠️ 5분 남았습니다!\n답안을 확인하고 제출을 준비하세요.');
}

// ── 창 이탈 감지 ──────────────────────────────────────────────────
function initGuard(){
  document.addEventListener('visibilitychange',onHide);
  window.addEventListener('blur',onBlur);
  window.addEventListener('focus',onFocus);
  guardOn=true;
}
function pauseGuard(){
  clearTimeout(blurTimer);
  document.removeEventListener('visibilitychange',onHide);
  window.removeEventListener('blur',onBlur);
}
function resumeGuard(){
  setTimeout(()=>{
    document.addEventListener('visibilitychange',onHide);
    window.addEventListener('blur',onBlur);
  },500);
}
function onHide(){if(document.hidden&&!locked)triggerLock();}
function onFocus(){clearTimeout(blurTimer);}
function onBlur(){
  if(locked) return;
  blurTimer=setTimeout(()=>{if(!locked)triggerLock();},400); // 300ms 딜레이
}
function triggerLock(){
  if(locked) return;
  locked=true; warnCnt++;
  lockSec=60;
  autoSave();
  $('lock-overlay').classList.add('on');
  $('lock-secs').textContent=lockSec;
  lockIv=setInterval(()=>{
    lockSec--;
    $('lock-secs').textContent=lockSec;
    if(lockSec<=0){clearInterval(lockIv);releaseLock();}
  },1000);
}
function releaseLock(){
  locked=false;
  $('lock-overlay').classList.remove('on');
  window.focus();
}

// ── 제출 ─────────────────────────────────────────────────────────
function confirmSubmit(){
  pauseGuard();
  const unan=Object.keys(MC_ANS).filter(k=>!ans.mc[parseInt(k)]).length;
  const msg=unan>0
    ?`객관식 ${unan}문항이 미답변 상태입니다.\n그래도 최종 제출하시겠습니까?`
    :'최종 제출하시겠습니까?\n제출 후에는 수정이 불가능합니다.';
  if(confirm(msg)){doSubmit();}
  else{resumeGuard();}
}
async function doSubmit(){
  clearInterval(timerIv);
  pauseGuard();
  const data=collectData();
  data._final=true;
  localStorage.setItem('physio26_'+sid,JSON.stringify(data));
  let ok=false;
  try{
    await fetch(EXAM_CONFIG.scriptURL,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)});
    ok=true;
  }catch(e){}
  showDone(ok,data);
}
function autoSubmit(){
  clearInterval(timerIv);
  pauseGuard();
  showAlert('⏰ 시험 시간이 종료되었습니다.\n자동으로 제출됩니다.');
  doSubmit();
}
function showDone(ok,data){
  $('done-icon').textContent=ok?'✅':'💾';
  $('done-ttl').textContent=ok?'제출 완료':'로컬 저장 완료';
  $('done-msg').innerHTML=ok
    ?`<b>${sname}</b> 님의 답안이 성공적으로 전송되었습니다.<br>창을 닫고 교수님의 안내를 기다려주세요.<br><br><span style="font-size:12px;color:#94a3b8">이탈 감지 횟수: ${warnCnt}회</span>`
    :`네트워크 오류로 전송에 실패했으나<br>답안이 이 기기에 저장되었습니다.<br>교수님께 알리고 <b>복구 코드(8651)</b>로 재접속 후 제출하세요.`;
  if(!ok){$('done-warn').style.display='block';$('done-warn').textContent='⚠️ 반드시 교수님께 이 상황을 알리세요.';}
  showScreen('s-done');
}
function showAlert(msg){return alert(msg);}
</script>
